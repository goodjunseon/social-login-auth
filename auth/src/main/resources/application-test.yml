spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:auth-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:}
    access-token-expiration-seconds: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
